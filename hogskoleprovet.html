<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Högskoleprovet - Studieapp</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }
.hero { text-align: center; padding: 3rem 1rem 1.5rem; }
.hero h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
.subtitle { color: #94a3b8; margin-top: 0.5rem; font-size: 1.1rem; }
.section-grid { max-width: 900px; margin: 0 auto; padding: 1rem; }
.section-group { margin-bottom: 2rem; }
.section-group h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 1rem; padding-left: 0.25rem; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 0.3rem; text-align: left; color: #e2e8f0; font-family: inherit; }
.card:hover { transform: translateY(-2px); border-color: #60a5fa; box-shadow: 0 4px 20px rgba(96, 165, 250, 0.15); }
.card-code { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
.card-verbal .card-code { color: #60a5fa; }
.card-kvant .card-code { color: #a78bfa; }
.card-name { font-size: 0.9rem; font-weight: 600; }
.card-desc { font-size: 0.8rem; color: #64748b; }
.card-count { font-size: 0.7rem; color: #475569; margin-top: 0.3rem; }
.stats-bar { max-width: 900px; margin: 1rem auto 2rem; padding: 0 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
.stat-chip { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 0.4rem 0.8rem; font-size: 0.75rem; color: #94a3b8; }
.stat-chip strong { color: #e2e8f0; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 10; }
.btn-back { background: none; border: 1px solid #475569; color: #94a3b8; padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
.btn-back:hover { border-color: #60a5fa; color: #60a5fa; }
.quiz-info { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
.quiz-title { font-weight: 700; font-size: 1rem; }
.quiz-progress { font-size: 0.8rem; color: #64748b; }
.quiz-score { font-size: 0.9rem; color: #94a3b8; }
.quiz-body { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }
.question-context { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; line-height: 1.7; font-size: 0.95rem; color: #cbd5e1; white-space: pre-line; }
.question-context:empty { display: none; }
.question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.5; white-space: pre-line; }
.options { display: flex; flex-direction: column; gap: 0.6rem; }
.option-btn { background: #1e293b; border: 2px solid #334155; border-radius: 10px; padding: 1rem 1.25rem; text-align: left; cursor: pointer; transition: all 0.2s; font-size: 1rem; color: #e2e8f0; font-family: inherit; line-height: 1.4; }
.option-btn:hover:not(:disabled) { border-color: #60a5fa; background: #1e3a5f; }
.option-btn.correct { border-color: #22c55e; background: #14532d; }
.option-btn.wrong { border-color: #ef4444; background: #450a0a; }
.option-btn:disabled { cursor: default; }
.feedback { margin-top: 1.25rem; padding: 1.25rem; border-radius: 10px; font-size: 0.95rem; line-height: 1.6; display: none; }
.feedback.show { display: block; }
.feedback.correct { background: #14532d; border: 1px solid #22c55e; color: #bbf7d0; }
.feedback.wrong { background: #3f1212; border: 1px solid #ef4444; color: #fecaca; }
.feedback-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; }
.feedback-section { margin-top: 0.75rem; }
.feedback-section-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; margin-bottom: 0.25rem; }
.btn-next { margin-top: 1.5rem; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; color: white; padding: 0.8rem 2rem; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%; }
.results-container { max-width: 500px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; }
.results-container h2 { font-size: 1.8rem; margin-bottom: 1rem; }
.results-icon { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 700; color: #60a5fa; }
.results-score { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
.results-message { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
.results-breakdown { text-align: left; margin-bottom: 2rem; }
.result-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
.result-marker { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.result-marker.correct { background: #22c55e; }
.result-marker.wrong { background: #ef4444; }
.results-actions { display: flex; gap: 0.75rem; flex-direction: column; }
.btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; color: white; padding: 0.8rem 2rem; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-secondary { background: none; border: 1px solid #475569; color: #94a3b8; padding: 0.8rem 2rem; border-radius: 10px; font-size: 1rem; cursor: pointer; font-family: inherit; }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; }
.modal-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.25rem; }
.modal-sub { font-size: 0.85rem; color: #64748b; margin-bottom: 1.5rem; }
.modal-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; margin-bottom: 0.75rem; }
.size-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.75rem; }
.size-btn { background: #0f172a; border: 2px solid #334155; color: #94a3b8; border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.size-btn:hover { border-color: #60a5fa; color: #60a5fa; }
.size-btn.active { border-color: #60a5fa; background: #1e3a5f; color: #e2e8f0; }
.modal-actions { display: flex; gap: 0.75rem; }
.modal-actions .btn-primary { flex: 1; }
.modal-actions .btn-secondary { flex: 1; }
/* Progress bar on cards */
.card-progress { height: 3px; background: #334155; border-radius: 2px; overflow: hidden; margin-top: 0.5rem; }
.card-progress-fill { height: 100%; background: linear-gradient(90deg, #60a5fa, #a78bfa); border-radius: 2px; transition: width 0.3s; }
@media (max-width: 600px) {
    .hero h1 { font-size: 2rem; }
    .cards { grid-template-columns: 1fr 1fr; }
    .quiz-body { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>
<div id="app">
    <div id="start-screen" class="screen active">
        <div class="hero">
            <h1>Högskoleprovet</h1>
            <p class="subtitle">Välj ett delprov att öva på</p>
        </div>
        <div class="section-grid">
            <div class="section-group">
                <h2>Verbal del</h2>
                <div class="cards" id="verbal-cards"></div>
            </div>
            <div class="section-group">
                <h2>Kvantitativ del</h2>
                <div class="cards" id="kvant-cards"></div>
            </div>
        </div>
        <div class="stats-bar" id="stats-bar"></div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="quiz-header">
            <button class="btn-back" id="btn-back">← Tillbaka</button>
            <div class="quiz-info">
                <span id="quiz-title" class="quiz-title"></span>
                <span id="quiz-progress" class="quiz-progress"></span>
            </div>
            <div class="quiz-score" id="quiz-score"></div>
        </div>
        <div class="quiz-body">
            <div id="question-context" class="question-context"></div>
            <div id="question-text" class="question-text"></div>
            <div id="options" class="options"></div>
            <div id="feedback" class="feedback"></div>
            <button id="next-btn" class="btn-next" style="display:none">Nästa fråga</button>
        </div>
    </div>

    <!-- Välj antal frågor -->
    <div class="modal-overlay" id="size-modal">
        <div class="modal">
            <div class="modal-title" id="modal-quiz-name"></div>
            <div class="modal-sub" id="modal-quiz-sub"></div>
            <div class="modal-label">Antal frågor per session</div>
            <div class="size-btns" id="size-btns"></div>
            <div class="modal-actions">
                <button class="btn-secondary" id="modal-cancel">Avbryt</button>
                <button class="btn-primary" id="modal-start">Starta →</button>
            </div>
        </div>
    </div>

    <div id="results-screen" class="screen">
        <div class="results-container">
            <h2>Resultat</h2>
            <div id="results-icon" class="results-icon"></div>
            <div id="results-score" class="results-score"></div>
            <div id="results-message" class="results-message"></div>
            <div id="results-breakdown" class="results-breakdown"></div>
            <div class="results-actions">
                <button class="btn-primary" id="btn-retry">Försök igen</button>
                <button class="btn-secondary" id="btn-home">Välj annat delprov</button>
            </div>
        </div>
    </div>
</div>

<script>
// Varje fråga har:
//   question, options, correct (index), explanation (kort, alltid visad)
//   why: varför rätt svar är rätt (detaljerad)
//   misstag: vanliga felaktiga resonemang (visas vid fel svar)

const questionBank = {
    ord: { title: "ORD – Ordförståelse", color: "verbal", questions: (function() {
        const w = (word, rätt, f1, f2, f3, why, miss) => ({
            question: `Vad betyder ordet '${word}'?`,
            options: [rätt, f1, f2, f3],
            correct: 0,
            explanation: rätt + ".",
            why: why,
            misstag: miss
        });
        return [
w("redundant","Överflödig","Nödvändig","Komplicerad","Ursprunglig","Från latinets 'redundare' (rinna över). Mer än vad som behövs.","Tros betyda 'nödvändig' eftersom redundanta säkerhetssystem är viktiga – men ordet syftar på överskottet."),
w("pragmatisk","Praktisk och lösningsinriktad","Teoretisk","Pessimistisk","Överdriven","Från grekiskans 'pragma' (handling). Fokus på vad som fungerar, inte ideologi.","Förväxlas med dogmatisk (motsatsen) eller pessimistisk eftersom orden låter lika."),
w("altruistisk","Osjälvisk","Självisk","Likgiltig","Ambitiös","Från latinets 'alter' (den andra). Att tänka på andras bästa.","Blandas ihop med egoistisk – båda slutar på -isk. Kom ihåg: alter = andra."),
w("ambivalent","Kluven","Beslutsam","Engagerad","Likgiltig","'Ambi' = båda, 'valent' = värde. Värderar båda sidor samtidigt.","Förväxlas med 'likgiltig' – men ambivalent BRYR sig starkt, åt båda håll."),
w("dogmatisk","Håller fast vid åsikter utan omprövning","Flexibel","Vetenskaplig","Humoristisk","Ett dogma = lärosats som tas för given. Accepterar inte motargument.","Skillnad mot 'principfast': principfast kan motivera, dogmatisk bara fastslår."),
w("adekvat","Tillräcklig och lämplig","Överdriven","Otillräcklig","Exakt","Varken för lite eller för mycket, precis vad situationen kräver.","Förväxlas med 'exakt' – adekvat betyder inte perfekt, bara tillräckligt."),
w("kontroversiell","Omstridd","Obestridlig","Traditionell","Föråldrad","Från latinets 'controversus' (vänd emot). Har både för- och motståndare.","Ordet är neutralt – det säger bara att åsikterna går isär, inte att något är fel."),
w("eskalerande","Upptrappande","Avtagande","Stagnerande","Fluktuerande","Från italienskans 'scala' (trappa). Stegras steg för steg.","Förväxlas med 'fluktuerande' (svänger upp/ner). Eskalerande går bara UPP."),
w("sporadisk","Oregelbunden och sällsynt","Regelbunden","Tätt förekommande","Kontinuerlig","Från grekiskans 'sporadikos' (utspridd). Enstaka utan mönster.","Tros betyda 'ofta' – men sporadisk är alltid SÄLLSYNT."),
w("empatisk","Inkännande","Likgiltig","Aggressiv","Analytisk","Förmågan att sätta sig in i annans känsloliv.","Förväxlas med 'emfatisk' (eftertrycklig) – liknande stavning, olika betydelse."),
w("explicit","Uttryckligt uttalat","Underförstått","Känsligt","Förbjudet","Motsats till implicit. Direkt utsagt.","På engelska kan 'explicit' betyda vuxet innehåll, men i svenska är det bara 'tydligt'."),
w("implicit","Underförstådd","Uttalad","Förnekad","Upprepad","Med 'mellan raderna'. Antydd men inte direkt sagd.","Minnesregel: IMplicit = Inte uttalat. EXplicit = EXtra tydligt."),
w("konsensus","Samsyn","Oenighet","Majoritetsbeslut","Diskussion","Från latinets 'consensus' (samstämmighet). Alla överens.","Är starkare än majoritetsbeslut – kräver att ingen motsätter sig aktivt."),
w("paradoxal","Skenbart självmotsägande","Logisk","Komplicerad","Uppenbar","Något som verkar motsäga sig självt men kan vara sant.","Förväxlas med 'ologisk' – men en paradox är inte fel, bara överraskande."),
w("subtil","Diskret och finstilt","Tydlig","Aggressiv","Grov","En liten men betydelsefull skillnad. Subtil humor kräver eftertanke.","Tro inte att subtil = 'undergiven' – det är ett helt annat ord."),
w("obskyr","Dunkel eller okänd","Känd","Ljus","Enkel","Från latinets 'obscurus' (mörk). Svårbegriplig eller okänd.","Har ibland negativ biklang (tvivelaktig) men grundbetydelsen är bara 'oklar'."),
w("nyanserad","Innehåller flera skiftningar","Förenklad","Extrem","Färgad","Från franskans 'nuance'. Tar hänsyn till flera perspektiv.","Tros betyda 'neutral' – men nyanserad kan ha en åsikt, bara genomtänkt."),
w("kategorisk","Bestämd och absolut","Tveksam","Försiktig","Rörande","Ett kategoriskt nej är definitivt, utan utrymme för diskussion.","Förväxlas med 'kategoriserad' (indelad) som betyder något helt annat."),
w("prekär","Osäker och bekymmersam","Trygg","Enkel","Lyxig","En prekär situation är otrygg och kan förvärras snabbt.","Liknar 'precis' men har inget med det att göra. Tänk på 'prekariatet'."),
w("rigorös","Sträng och noggrann","Slapp","Gemytlig","Flexibel","En rigorös undersökning lämnar inga stenar orörda.","Förväxlas med 'rigid' (stel) som är mer negativt laddat."),
w("marginell","Obetydlig","Central","Dominerande","Genomgripande","Ligger i 'marginalen'. En marginell förbättring är nästan obetydlig.","Skillnad mot 'minimal': marginell = nästan obetydlig, minimal = minsta möjliga."),
w("utopisk","Orealistiskt idealiserad","Realistisk","Pessimistisk","Historisk","Från Thomas Mores 'Utopia' (1516). Grekiska 'ou-topos' = ingenstans.","Skillnad mot optimistisk: optimism tror på det goda, utopism på det perfekta."),
w("skeptisk","Tvivlande","Godtrogen","Övertygad","Nöjd","Kräver bevis innan man tror på något. Från grekiskans 'skeptikos'.","Skepsis är INTE cynism (förakt) eller pessimism – bara krav på belägg."),
w("benägenhet","Tendens eller böjelse","Ovilja","Förmåga","Plikt","Om man har benägenhet är man lätt att få med sig åt det hållet.","Skillnad mot 'förmåga': man kan ha förmåga utan benägenhet (kan men vill inte)."),
w("avsiktlig","Planerad och medveten","Slumpmässig","Motvillig","Snabb","Motsats till oavsiktlig. Gjord med vilja.","Ofta testas det som synonym till 'medveten'/'planerad' – de är synonymer."),
w("autentisk","Äkta","Falsk","Kopierad","Ytlig","Från grekiskans 'authentikos' (äkta). Inte en kopia eller förfalskning.","Förväxlas med 'original' – autentisk betyder äkta, inte nödvändigtvis först i tid."),
w("banal","Trivial och alldaglig","Komplicerad","Ovanlig","Djupgående","Från franska 'banal' (vanlig). Så vanligt att det är ointressant.","Ordet är negativt – antyder att något är intetsägande, inte bara enkelt."),
w("blygsam","Ödmjuk","Skrytsam","Dominerande","Aggressiv","Drar sig undan uppmärksamhet. Inte självutnämnande.","Skillnad mot 'tyst': blygsam syftar på att inte skryta, tyst på att inte prata."),
w("cynisk","Misstrogen","Godtrogen","Optimistisk","Idealistisk","Tror att människor styrs av egennytta. Ursprungligen en filosofisk skola.","Förväxlas med 'skeptisk' – cyniker tror inget är genuint, skeptiker kräver bara bevis."),
w("defensiv","Försvarande","Anfallande","Passiv","Aggressiv","Som försvarar (sig själv eller annat). Vanligt inom sport.","Förväxlas med 'passiv' – defensiv är aktivt försvar, passiv är ingen handling alls."),
w("diskret","Finkänslig och tystlåten","Högljudd","Skrytsam","Störande","Håller låg profil, för inte vidare det man hör.","Inom matematik betyder diskret även 'åtskild/icke-kontinuerlig' – helt annan betydelse."),
w("egalitär","Jämlikhetsivrande","Hierarkisk","Elitistisk","Konservativ","Förespråkar lika rättigheter för alla. Från franska 'égal' (lika).","Är inte samma som 'demokratisk' – egalitär rör all social jämlikhet."),
w("empirisk","Baserad på erfarenhet","Teoretisk","Fantasifull","Ologisk","Från grekiska 'empeiria' (erfarenhet). Baserad på observation/försök.","Motsats till rent teoretisk. Empirisk forskning kräver faktiska mätningar."),
w("essentiell","Väsentlig","Oviktig","Valfri","Tillfällig","Av själva essensen – absolut nödvändig, inte bara önskvärd.","Förväxlas med 'viktig' – essentiell är starkare, betyder oumbärlig."),
w("estetisk","Skönhetsrelaterad","Praktisk","Moralisk","Logisk","Från grekiska 'aisthesis' (förnimmelse). Hur något upplevs visuellt.","Förväxlas med 'asketisk' (sparsam livsstil) – helt annan betydelse."),
w("euforisk","Lyckorusig","Ledsen","Likgiltig","Förvirrad","Känsla av överväldigande glädje eller upprymdhet.","Stavas med eu-, inte 'yu-' eller 'ö-'."),
w("evident","Uppenbar","Dold","Osäker","Tvivelaktig","Från latinets 'evidens' (tydlig). Så tydligt att det inte kräver bevis.","Samma betydelse som engelska 'evident' – 'tydlig'."),
w("exceptionell","Ovanligt framstående","Vanlig","Misslyckad","Medelmåttig","Utgör ett undantag från det vanliga. Mycket bättre än standard.","Är nästan alltid positivt laddat – 'exceptionellt dålig' låter konstigt."),
w("extrovert","Utåtriktad","Inåtvänd","Blyg","Tystlåten","Får energi av att umgås. Från latinets 'extra' (utåt) + 'vertere' (vända).","Motsatsen är introvert. Ordet handlar om energiriktning."),
w("flagrant","Uppenbar (ofta om fel)","Dold","Mindre","Obetydlig","Från latinets 'flagrare' (brinna). Så tydligt att det är skamligt.","Används mest om fel: 'flagrant lagbrott' = uppenbart brott."),
w("frekvent","Ofta förekommande","Sällsynt","Omöjlig","Tvetydig","Från latinets 'frequens' (talrik). Hög frekvens = ofta.","Är INTE samma som 'frekvens' (antal per tid) – adjektivet betyder 'ofta'."),
w("fundamental","Grundläggande","Ytlig","Tillfällig","Onödig","Från latinets 'fundamentum' (grund). Så viktigt att allt annat vilar på det.","Förväxlas med 'fundamentalistisk' – helt annan betydelse."),
w("genuin","Äkta","Falsk","Överdriven","Kopia","Uppriktigt, inte spelat.","Synonym till autentisk, men 'genuin' används oftare om känslor och personlighet."),
w("heterogen","Blandad","Enhetlig","Renrasig","Symmetrisk","Från grekiska 'heteros' (olika) + 'genos' (slag).","Motsats till homogen. 'Hetero' = olika, har olika beståndsdelar."),
w("homogen","Enhetlig","Blandad","Splittrad","Olika","Från grekiska 'homos' (samma). Av samma slag genomgående.","Motsats till heterogen. En homogen lösning är likformig överallt."),
w("hypotetisk","Antagen som möjlig","Bevisad","Orealistisk","Påtaglig","Grundad på en hypotes – alltså inte fastställd.","Skillnad mot 'teoretisk': hypotetisk = antagande, teoretisk = abstrakt."),
w("idyllisk","Harmonisk och fridfull","Kaotisk","Spännande","Tråkig","Från grekiska 'idyll' (liten naturbild). Fridfullt, ofta lite för perfekt.","Har ofta en biton av 'för bra för att vara sant'."),
w("illusorisk","Skenbar","Verklig","Konkret","Tydlig","Baserad på en illusion. Verkar verklig men är det inte.","Skillnad mot 'imaginär': illusorisk är något som ser ut att finnas."),
w("immanent","Iboende","Yttre","Transcendent","Frånvarande","Filosofi: finns INOM något, inte utanför. Motsats till transcendent.","Förväxlas med 'imminent' (förestående) – helt annan betydelse!"),
w("inert","Passiv, overksam","Aktiv","Explosiv","Reaktiv","Från kemin: reagerar inte med andra ämnen (t.ex. ädelgaser).","Stavas med I, inte E. Betyder inte 'tröttande'."),

    mek: { title: "MEK – Meningskomplettering", color: "verbal", questions: [
        { question: "Trots att hon var mycket ____ lyckades hon hålla ett lugnt yttre.", options: ["gladlynt", "uppretad", "avslappnad", "utvilad"], correct: 1,
          explanation: "'Trots' signalerar kontrast – hon var uppretad men visade lugn.",
          why: "Nyckelordet 'trots' kräver en motsättning till 'lugnt yttre'. Bara 'uppretad' skapar den kontrasten.",
          misstag: "Man lockas att välja 'avslappnad' eller 'utvilad' eftersom de passar med lugnt yttre – men då behövs inte ordet 'trots'. Hitta alltid kontrastmarkörer först (trots, men, ändå, dock)." },
        { question: "Forskarens teori var så ____ att den fick både beröm och kritik.", options: ["trivial", "konventionell", "provokativ", "föråldrad"], correct: 2,
          explanation: "En provokativ teori väcker både beröm och kritik.",
          why: "Nyckelordet är 'både...och'. En teori som splittrar åsikter är provokativ/omstridd.",
          misstag: "Trivial (obetydlig), konventionell (gängse) och föråldrad skulle knappast väcka beröm – bara likgiltighet eller kritik. Leta efter alternativ som skapar DELADE reaktioner." },
        { question: "Hans ____ sätt att framföra budskapet gjorde att publiken tappade intresset.", options: ["engagerande", "monotona", "underhållande", "inspirerande"], correct: 1,
          explanation: "Monotont framförande tappar publikens intresse.",
          why: "Konsekvensen (publiken tappade intresset) kräver en negativ orsak. Bara 'monotont' är negativt bland alternativen.",
          misstag: "Läs alltid resultatledet först – om konsekvensen är negativ måste orsaken också vara negativ (eller neutral som blir tråkig)." },
        { question: "I takt med att tekniken ____ förväntades även kraven på säkerhet öka.", options: ["stagnerade", "avvecklades", "utvecklades", "försvann"], correct: 2,
          explanation: "När tekniken utvecklas ökar säkerhetskraven.",
          why: "'I takt med' signalerar parallell utveckling. Om säkerhetskraven ÖKAR måste tekniken också gå FRAMÅT.",
          misstag: "Stagnerade, avvecklades och försvann är alla negativa/minskande – skulle inte leda till ökade krav utan minskade." },
        { question: "Det ____ samarbetet mellan länderna ledde till en överraskande snabb lösning.", options: ["bristfälliga", "effektiva", "onödiga", "tillfälliga"], correct: 1,
          explanation: "Effektivt samarbete leder till snabb lösning.",
          why: "Snabb lösning förutsätter bra samarbete. 'Effektivt' är det enda positiva alternativet.",
          misstag: "Lockas inte av 'tillfälliga' bara för att det låter neutralt – ett tillfälligt samarbete ger inte automatiskt snabb lösning." },
        { question: "Reporterns fråga var så ____ att politikern valde att inte svara.", options: ["harmlös", "relevant", "provocerande", "vänlig"], correct: 2,
          explanation: "En provocerande fråga kan få någon att välja att inte svara.",
          why: "Konsekvensen (väljer att inte svara) kräver en obekväm orsak. Provocerande passar.",
          misstag: "Man kan lockas av 'relevant' – men en relevant fråga skulle politikern oftast gärna besvara för att visa kunskap. Det är obehaget som gör att man tiger." },
        { question: "Den ____ rapporten avslöjade allvarliga brister i organisationen.", options: ["ytliga", "grundliga", "förkortade", "ofullständiga"], correct: 1,
          explanation: "En grundlig rapport kan avslöja brister som andra missat.",
          why: "För att AVSLÖJA något krävs djupgående arbete. Ytliga/ofullständiga rapporter missar snarare brister.",
          misstag: "Läs ordet 'avslöjade' noggrant – det kräver en kraftfull orsak. En ytlig rapport skulle bara antyda brister, inte avslöja dem." },
        { question: "Även om förslaget verkade ____ vid första anblicken visade det sig vara välgenomtänkt.", options: ["genomarbetat", "orealistiskt", "logiskt", "välplanerat"], correct: 1,

          misstag: "Om du väljer 'genomarbetat', 'logiskt' eller 'välplanerat' skapas ingen kontrast – meningen blir då motsägelsefull. 'Även om' kräver alltid motsatser." },
        { question: "Läkarens ____ diagnos räddade patientens liv.", options: ["felaktiga", "senkomna", "snabba", "osäkra"], correct: 2,

          why: "För att rädda liv behövs en positiv egenskap hos diagnosen. 'Snabb' är enda klart positiva.",
          misstag: "Felaktig, senkommen och osäker är alla negativa – de skulle snarare hota patienten." },
        { question: "Den nya lagen mottogs med ____ från både företagare och fackförbund.", options: ["entusiasm", "skepsis", "likgiltighet", "förvåning"], correct: 1,
          explanation: "Skepsis från båda sidor tyder på att lagen var omstridd.",

          misstag: "Entusiasm från båda skulle vara möjligt men osannolikt. Likgiltighet passar inte eftersom de ändå uttrycker en reaktion. Skepsis är den gemensamma nämnaren när ingen är nöjd." },
        { question: "Kritiken var så ____ att forskaren tvingades dra tillbaka sin artikel.", options: ["mild", "välgrundad", "oklar", "överdriven"], correct: 1,
          explanation: "Välgrundad kritik tvingar till återkallelse.",

        { question: "Hennes ____ engagemang i frågan imponerade på hela styrelsen.", options: ["halvhjärtade", "flyktiga", "oförtrutna", "tveksamma"], correct: 2,
          explanation: "Oförtrutet engagemang (ihärdigt, ihållande) imponerar.",
          why: "Att 'imponera' kräver en positiv egenskap. Oförtrutet = outtröttligt, ihärdigt.",
          misstag: "De andra alternativen är alla negativa – halvhjärtat, flyktigt och tveksamt engagemang imponerar inte." },
        { question: "Den nya metoden var visserligen ____ men gav bättre resultat än de traditionella.", options: ["beprövad", "oprövad", "enkel", "populär"], correct: 1,
          explanation: "'Visserligen...men' = kontrast. Oprövad står mot bra resultat.",
          why: "'Visserligen...men' kräver två motsatta bedömningar. Oprövad är negativt, bättre resultat är positivt – kontrasten fungerar.",
          misstag: "'Beprövad' skulle ta bort kontrasten (beprövad + bra resultat = ingen motsättning)." },
        { question: "Bristen på ____ gjorde att projektet aldrig blev klart.", options: ["problem", "resurser", "kritik", "hinder"], correct: 1,

        { question: "Politikerns svar var så ____ att ingen förstod vad han egentligen menade.", options: ["precist", "klart", "kryptiskt", "uppriktigt"], correct: 2,

          why: "Om 'ingen förstod' var svaret oklart. Kryptiskt matchar direkt.",

        { question: "Trots sin ____ lyckades hon övertyga publiken med sina argument.", options: ["vältalighet", "blyghet", "erfarenhet", "auktoritet"], correct: 1,

          why: "Att övertyga en publik kräver vanligtvis mod/säkerhet. Blyghet är motsatsen – därav kontrasten med 'trots'.",

        { question: "Det ____ regnet förstörde hela skörden.", options: ["milda", "ihållande", "sporadiska", "svaga"], correct: 1,

        { question: "Hans argument var så ____ att ingen kunde emotsäga honom.", options: ["svaga", "vaga", "slagkraftiga", "komplicerade"], correct: 2,

          misstag: "Svaga/vaga/komplicerade argument är lätta att emotsäga eller att avfärda." },
        { question: "Forskarna uttryckte sin ____ över de oväntade resultaten.", options: ["säkerhet", "förvåning", "tristess", "likgiltighet"], correct: 1,

          why: "Logisk koppling: 'oväntade' leder till reaktionen 'förvåning'. De andra orden passar inte till oväntat.",

    xyz: { name: "Kvantitativ jämförelse", desc: "Jämför uttryck" },
    kva: { name: "Kvantitativa resonemang", desc: "Matematiska problem" },
    nog: { name: "Tillräckliga uppgifter", desc: "Bedöm om info räcker" },
    dtk: { name: "Diagram & tabeller", desc: "Tolka data visuellt" }
};

let currentQuiz = null;
let currentQuestionIndex = 0;
let score = 0;
let answers = [];
let shuffledQuestions = [];
let sessionWrapped = false;
let pendingQuizType = null;
let selectedSize = 10;

function getStats() { try { return JSON.parse(localStorage.getItem('hp-stats') || '{}'); } catch(e) { return {}; } }
function saveStats(type, correct, total) {
    const stats = getStats();
    if (!stats[type]) stats[type] = { attempts: 0, totalCorrect: 0, totalQuestions: 0 };
    stats[type].attempts++;
    stats[type].totalCorrect += correct;
    stats[type].totalQuestions += total;
    try { localStorage.setItem('hp-stats', JSON.stringify(stats)); } catch(e) {}
}

// Seen-question tracking so frågor inte upprepas
function getSeen(type) {
    try { return JSON.parse(localStorage.getItem(`hp-seen-${type}`) || '[]'); } catch(e) { return []; }
}
function markSeen(type, qIndex) {
    const seen = getSeen(type);
    if (!seen.includes(qIndex)) {
        seen.push(qIndex);
        try { localStorage.setItem(`hp-seen-${type}`, JSON.stringify(seen)); } catch(e) {}
    }
}
function resetSeen(type) {
    try { localStorage.removeItem(`hp-seen-${type}`); } catch(e) {}
}
function resetAllProgress() {
    if (!confirm('Nollställ alla framsteg (sedda frågor + statistik)?')) return;
    Object.keys(questionBank).forEach(t => resetSeen(t));
    try { localStorage.removeItem('hp-stats'); } catch(e) {}
    renderCards();
    renderStats();
}

function renderStats() {
    const stats = getStats();
    const bar = document.getElementById('stats-bar');
    const entries = Object.entries(stats);
    if (entries.length === 0) {
        bar.innerHTML = '<span class="stat-chip">Inga resultat än – börja öva!</span>';
        return;
    }
    bar.innerHTML = entries.map(([key, s]) => {
        const pct = Math.round((s.totalCorrect / s.totalQuestions) * 100);
        return `<span class="stat-chip"><strong>${key.toUpperCase()}</strong> ${pct}% (${s.attempts} försök)</span>`;
    }).join('');
}

function renderCards() {
    const verbal = ['ord', 'las', 'mek', 'elf'];
    const kvant = ['xyz', 'kva', 'nog', 'dtk'];
    const make = (keys, cls) => keys.map(k => {
        const total = questionBank[k].questions.length;
        const seen = Math.min(getSeen(k).length, total);
        const pct = total ? Math.round((seen / total) * 100) : 0;
        const done = seen >= total && total > 0;
        return `
        <button class="card card-${cls}" data-quiz="${k}">
            <span class="card-code">${k.toUpperCase()}</span>
            <span class="card-name">${sectionMeta[k].name}</span>
            <span class="card-desc">${sectionMeta[k].desc}</span>
            <span class="card-count">${seen}/${total} sedda${done ? ' – klar!' : ''}</span>
            <span class="card-progress"><span class="card-progress-fill" style="width:${pct}%"></span></span>
        </button>`;
    }).join('');
    document.getElementById('verbal-cards').innerHTML = make(verbal, 'verbal');
    document.getElementById('kvant-cards').innerHTML = make(kvant, 'kvant');
    document.querySelectorAll('.card').forEach(c => {
        c.addEventListener('click', () => showSizeModal(c.dataset.quiz));
    });
}

// --- Modal för att välja antal frågor ---
function showSizeModal(type) {
    const bank = questionBank[type];
    if (!bank) return;
    pendingQuizType = type;
    const total = bank.questions.length;
    const seen = getSeen(type).length;
    const unseen = Math.max(0, total - seen);

    document.getElementById('modal-quiz-name').textContent = bank.title;
    document.getElementById('modal-quiz-sub').textContent =
        unseen > 0
            ? `${unseen} av ${total} frågor kvar att göra`
            : `Alla ${total} frågor klara – startar ny runda!`;

    // Bygg storleksknappar dynamiskt baserat på antal tillgängliga frågor
    const pool = unseen > 0 ? unseen : total;
    const presets = [5, 10, 15, 20, 30].filter(n => n <= pool);
    if (!presets.includes(pool)) presets.push(pool); // "Alla"

    const btnContainer = document.getElementById('size-btns');
    btnContainer.innerHTML = '';
    if (selectedSize > pool) selectedSize = pool;

    presets.forEach(n => {
        const btn = document.createElement('button');
        btn.className = 'size-btn' + (n === selectedSize ? ' active' : '');
        btn.textContent = n === pool ? `Alla (${n})` : String(n);
        btn.addEventListener('click', () => {
            selectedSize = n;
            btnContainer.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
        btnContainer.appendChild(btn);
    });

    document.getElementById('size-modal').classList.add('open');
}

function closeSizeModal() {
    document.getElementById('size-modal').classList.remove('open');
    pendingQuizType = null;
}

document.getElementById('modal-cancel').addEventListener('click', closeSizeModal);
document.getElementById('modal-start').addEventListener('click', () => {
    const type = pendingQuizType;
    closeSizeModal();
    startQuiz(type);
});
// Stäng om man klickar utanför modalen
document.getElementById('size-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSizeModal();
});

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
}

function goHome() {
    renderCards();
    renderStats();
    showScreen('start-screen');
}

function startQuiz(type) {
    const bank = questionBank[type];
    if (!bank) return;
    const totalQ = bank.questions.length;
    let seen = getSeen(type);
    let unseenIndices = [];
    for (let i = 0; i < totalQ; i++) if (!seen.includes(i)) unseenIndices.push(i);
    sessionWrapped = false;
    if (unseenIndices.length === 0) {
        // Alla frågor är sedda - nollställ och börja om
        resetSeen(type);
        sessionWrapped = true;
        unseenIndices = [];
        for (let i = 0; i < totalQ; i++) unseenIndices.push(i);
    }
    // Shuffla obesvarade frågor och ta det antal användaren valde
    const picked = shuffle(unseenIndices).slice(0, selectedSize);
    currentQuiz = type;
    currentQuestionIndex = 0;
    score = 0;
    answers = [];
    // Bygg session. Shuffla även svarsalternativen och remappa rätt-index.
    shuffledQuestions = picked.map(idx => {
        const q = bank.questions[idx];
        const correctText = q.options[q.correct];
        const shuffledOpts = shuffle(q.options);
        return {
            ...q,
            options: shuffledOpts,
            correct: shuffledOpts.indexOf(correctText),
            _origIndex: idx
        };
    });
    const titleEl = document.getElementById('quiz-title');
    titleEl.textContent = bank.title + (sessionWrapped ? ' - ny runda!' : '');
    showScreen('quiz-screen');
    renderQuestion();
}

function renderQuestion() {
    const q = shuffledQuestions[currentQuestionIndex];
    const total = shuffledQuestions.length;
    document.getElementById('quiz-progress').textContent = `Fråga ${currentQuestionIndex + 1} av ${total}`;
    document.getElementById('quiz-score').textContent = `${score} rätt`;
    document.getElementById('question-context').textContent = q.context || '';
    document.getElementById('question-text').textContent = q.question;
    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = `${String.fromCharCode(65 + i)}. ${opt}`;
        btn.addEventListener('click', () => selectAnswer(i));
        optionsEl.appendChild(btn);
    });
    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.innerHTML = '';
    document.getElementById('next-btn').style.display = 'none';
    window.scrollTo(0, 0);
}

function selectAnswer(index) {
    const q = shuffledQuestions[currentQuestionIndex];
    const buttons = document.querySelectorAll('.option-btn');
    const isCorrect = index === q.correct;
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        if (i === index && !isCorrect) btn.classList.add('wrong');
    });
    if (isCorrect) score++;
    // Markera frågan som sedd så den inte återkommer
    if (typeof q._origIndex === 'number') markSeen(currentQuiz, q._origIndex);
    answers.push({ question: q.question, correct: isCorrect });

    const fb = document.getElementById('feedback');
    const correctLetter = String.fromCharCode(65 + q.correct);
    const correctText = q.options[q.correct];

    let html = '';
    if (isCorrect) {
        html += `<div class="feedback-title">✓ Rätt svar!</div>`;
        html += `<div>${escapeHtml(q.explanation)}</div>`;
        if (q.why) {
            html += `<div class="feedback-section"><div class="feedback-section-label">Varför</div>${escapeHtml(q.why)}</div>`;
        }
    } else {
        const userLetter = String.fromCharCode(65 + index);
        html += `<div class="feedback-title">✗ Fel svar</div>`;
        html += `<div>Du svarade <strong>${userLetter}</strong>. Rätt svar är <strong>${correctLetter}. ${escapeHtml(correctText)}</strong>.</div>`;
        html += `<div class="feedback-section"><div class="feedback-section-label">Förklaring</div>${escapeHtml(q.explanation)}</div>`;
        if (q.why) {
            html += `<div class="feedback-section"><div class="feedback-section-label">Varför detta är rätt</div>${escapeHtml(q.why)}</div>`;
        }
        if (q.misstag) {
            html += `<div class="feedback-section"><div class="feedback-section-label">Vanligt misstag</div>${escapeHtml(q.misstag)}</div>`;
        }
    }
    fb.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
    fb.innerHTML = html;

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = currentQuestionIndex < shuffledQuestions.length - 1 ? 'Nästa fråga' : 'Visa resultat';
}

function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < shuffledQuestions.length) {
        renderQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    const total = shuffledQuestions.length;
    const pct = Math.round((score / total) * 100);
    saveStats(currentQuiz, score, total);
    let icon, message;
    if (pct >= 80) { icon = '★ Toppresultat!'; message = 'Utmärkt! Du behärskar detta område mycket bra.'; }
    else if (pct >= 60) { icon = '✓ Bra jobbat!'; message = 'Bra resultat! Fortsätt öva för att nå ännu högre.'; }
    else if (pct >= 40) { icon = '↗ På god väg'; message = 'Du är på rätt väg. Fokusera på det du missar.'; }
    else { icon = '↻ Fortsätt öva'; message = 'Ge inte upp! Repetition är nyckeln.'; }
    document.getElementById('results-icon').textContent = icon;
    document.getElementById('results-score').textContent = `${score}/${total} (${pct}%)`;
    document.getElementById('results-message').textContent = message;
    const breakdown = document.getElementById('results-breakdown');
    breakdown.innerHTML = answers.map((a, i) => {
        const shortQ = a.question.length > 60 ? a.question.substring(0, 60) + '...' : a.question;
        return `<div class="result-item"><div class="result-marker ${a.correct ? 'correct' : 'wrong'}"></div><span>${i + 1}. ${escapeHtml(shortQ.replace(/\n/g, ' '))}</span></div>`;
    }).join('');
    showScreen('results-screen');
}

document.getElementById('btn-back').addEventListener('click', goHome);
document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('btn-retry').addEventListener('click', () => startQuiz(currentQuiz));
document.getElementById('btn-home').addEventListener('click', goHome);

renderCards();
renderStats();
</script>
</body>
</html>
